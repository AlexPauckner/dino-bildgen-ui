<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Bildgen UI V3</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1><span>&#x1F995;</span> Dino Bildgen UI <small style="font-size:11px;color:var(--text-dim);margin-left:6px">V3</small></h1>
    <div class="header-actions">
        <div class="file-input-wrapper">
            <button class="btn btn-secondary btn-small">Script laden</button>
            <input type="file" id="scriptFile" accept=".py">
        </div>
        <button class="btn btn-secondary btn-small" onclick="resetBlocks()">Neu</button>
    </div>
</header>

<div class="app-layout">
    <!-- Left: Editor -->
    <div class="editor-panel" id="editorPanel">
        <div id="emptyState" class="empty-state">
            <p>Lade ein Python-Script oder starte mit leeren Bl&ouml;cken.</p>
            <div class="file-input-wrapper">
                <button class="btn btn-primary">Script &ouml;ffnen (.py)</button>
                <input type="file" accept=".py" onchange="document.getElementById('scriptFile').files = this.files; loadScript()">
            </div>
            <p style="margin-top: 16px">
                <button class="btn btn-secondary" onclick="resetBlocks()">Leere Bl&ouml;cke starten</button>
            </p>
        </div>

        <div id="blocksContainer" style="display:none">
            <!-- Style -->
            <div class="block-card" data-block="style">
                <div class="block-header" onclick="toggleBlock(this)">
                    <span class="block-title">Style</span>
                    <span class="block-meta" data-counter></span>
                </div>
                <div class="block-body">
                    <textarea data-field="style" oninput="updatePreview()" placeholder="STYLE: Oil painted children's book illustration with thick impasto brush strokes.&#10;Texture hierarchy &mdash; characters: bold sculptural strokes, environment: medium detail,&#10;sky/background: soft atmospheric washes. Medium: oil on canvas."></textarea>
                </div>
            </div>

            <!-- Scene -->
            <div class="block-card scene" data-block="scene">
                <div class="block-header" onclick="toggleBlock(this)">
                    <span class="block-title">Scene</span>
                    <span class="block-meta" data-counter></span>
                </div>
                <div class="block-body">
                    <textarea data-field="scene" oninput="updatePreview()" placeholder="SCENE: Was passiert im Bild? Ort, Handlung, Stimmung, Licht..."></textarea>
                </div>
            </div>

            <!-- Character -->
            <div class="block-card" data-block="character">
                <div class="block-header" onclick="toggleBlock(this)">
                    <span class="block-title">Character</span>
                    <span class="block-meta" data-counter></span>
                </div>
                <div class="block-body">
                    <textarea data-field="character" oninput="updatePreview()" placeholder="CHARACTER: Dino-Beschreibung, Proportionen, Alter, Merkmale...&#10;Child proportions &mdash; large heads, big expressive eyes."></textarea>
                </div>
            </div>

            <!-- Composition -->
            <div class="block-card" data-block="composition">
                <div class="block-header" onclick="toggleBlock(this)">
                    <span class="block-title">Composition</span>
                    <span class="block-meta" data-counter></span>
                </div>
                <div class="block-body">
                    <textarea data-field="composition" oninput="updatePreview()" placeholder="COMPOSITION: Kamera, Perspektive, Bildaufbau, Vordergrund/Hintergrund..."></textarea>
                </div>
            </div>

            <!-- Negative -->
            <div class="block-card" data-block="negative">
                <div class="block-header" onclick="toggleBlock(this)">
                    <span class="block-title">Negative</span>
                    <span class="block-meta" data-counter></span>
                </div>
                <div class="block-body">
                    <textarea data-field="negative" oninput="updatePreview()" placeholder="NEGATIVE: No photorealism, no 3D render, no anime, no artist signature,&#10;no canvas weave texture, no bokeh circles, no text, no watermarks."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Right: Refs + Results -->
    <div class="right-panel">
        <!-- Reference Images: 3 Categories -->
        <div class="panel-section">
            <div class="panel-section-header">
                <span>Referenzbilder</span>
                <span class="ref-total" id="refTotal">0</span>
            </div>
            <div class="panel-section-body ref-categories-body">
                <!-- Style Refs -->
                <div class="ref-category" data-role="style">
                    <div class="ref-cat-header">
                        <span>Style Refs <span class="ref-count" id="styleRefCount">0</span></span>
                        <div class="file-input-wrapper">
                            <button class="btn btn-secondary btn-small">+</button>
                            <input type="file" accept="image/*" multiple onchange="uploadRefsToCategory('style', this.files)">
                        </div>
                    </div>
                    <div class="ref-cat-drop" ondragover="refCatDragOver(event)" ondragleave="refCatDragLeave(event)" ondrop="refCatDrop(event, 'style')">
                        <div class="ref-grid" id="styleRefGrid"></div>
                    </div>
                </div>

                <!-- Character Refs -->
                <div class="ref-category" data-role="character">
                    <div class="ref-cat-header">
                        <span>Character Refs <span class="ref-count" id="characterRefCount">0</span></span>
                        <div class="file-input-wrapper">
                            <button class="btn btn-secondary btn-small">+</button>
                            <input type="file" accept="image/*" multiple onchange="uploadRefsToCategory('character', this.files)">
                        </div>
                    </div>
                    <div class="ref-cat-drop" ondragover="refCatDragOver(event)" ondragleave="refCatDragLeave(event)" ondrop="refCatDrop(event, 'character')">
                        <div class="ref-grid" id="characterRefGrid"></div>
                    </div>
                </div>

                <!-- Scribble Refs -->
                <div class="ref-category" data-role="scribble">
                    <div class="ref-cat-header">
                        <span>Scribbles <span class="ref-count" id="scribbleRefCount">0</span></span>
                        <div class="file-input-wrapper">
                            <button class="btn btn-secondary btn-small">+</button>
                            <input type="file" accept="image/*" multiple onchange="uploadRefsToCategory('scribble', this.files)">
                        </div>
                    </div>
                    <div class="ref-cat-drop" ondragover="refCatDragOver(event)" ondragleave="refCatDragLeave(event)" ondrop="refCatDrop(event, 'scribble')">
                        <div class="ref-grid" id="scribbleRefGrid"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ref Suggestions -->
        <div class="panel-section" id="suggestionsSection" style="display:none">
            <div class="panel-section-header">
                <span>Passende Refs (klick = hinzuf&uuml;gen)</span>
            </div>
            <div class="panel-section-body" style="max-height:180px">
                <div id="suggestionsContainer" style="display:none"></div>
            </div>
        </div>

        <!-- Output Directory -->
        <div class="panel-section">
            <div class="panel-section-header">
                <span>Output-Ordner</span>
                <button class="btn btn-secondary btn-small" onclick="openOutputDir()">Im Finder</button>
            </div>
            <div class="dir-input">
                <input type="text" id="outputDirInput" value="~/Kinderbuch/Comic_Projekt_2025/Dino-Buch/NB2-Neue-Arten" onchange="changeOutputDir(this.value)">
            </div>
        </div>

        <!-- Generated Results -->
        <div class="panel-section" style="flex:1; display:flex; flex-direction:column;">
            <div class="panel-section-header">
                <span>Ergebnisse</span>
                <button class="btn btn-secondary btn-small" onclick="loadOutputImages()">Refresh</button>
            </div>
            <div class="panel-section-body results" id="resultsContainer">
            </div>
        </div>
    </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
    <div class="prompt-preview-toggle" onclick="togglePreview()">
        <span>Prompt Preview (<span id="totalChars">0</span> Zeichen)</span>
        <span id="previewArrow">&#x25BC;</span>
    </div>
    <div class="prompt-preview" id="promptPreview"></div>

    <div class="generate-row">
        <input type="text" id="outputName" value="generated" placeholder="Dateiname">

        <label>Temp</label>
        <input type="range" id="temperature" min="0" max="2" step="0.1" value="1.0" oninput="document.getElementById('tempValue').textContent = this.value">
        <span id="tempValue" style="font-size:12px; color:var(--text-dim); min-width:24px">1.0</span>

        <label>Varianten</label>
        <input type="number" id="variants" min="1" max="5" value="1">

        <label class="context-toggle" title="Kinderbuch-Kontext-Prefix voranstellen">
            <input type="checkbox" id="contextPrefix" checked>
            <span>Kinderbuch</span>
        </label>

        <button class="btn btn-primary" id="generateBtn" onclick="generate()">Generate</button>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" style="display:none" onclick="this.style.display='none'">
    <img id="lightboxImg" src="">
</div>

<script src="/static/app.js"></script>
</body>
</html>
